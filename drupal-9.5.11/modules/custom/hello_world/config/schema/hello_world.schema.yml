hello_world.settings:
  type: config_object
  label: 'Hello World Settings'
  mapping:
    hello:
      type: mapping
      label: 'Hello Settings'
      mapping:
        name:
          type: string
          label: 'Default Hello Message'
    paysecure_api_key:
      type: string
      label: 'Paysecure API Key'
    paysecure_endpoint:
      type: string
      label: 'Paysecure Endpoint'
