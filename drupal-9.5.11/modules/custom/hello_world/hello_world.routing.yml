hello_world.content:
  path: '/hello'
  defaults:
    _controller: '\Drupal\hello_world\Controller\HelloController::hello'
    _title: 'Hello World'
  requirements:
    _permission: 'access content'

hello_world.settings_form:
  path: '/admin/config/development/hello-world'
  defaults:
    _form: '\Drupal\hello_world\Form\HelloWorldSettingsForm'
    _title: 'Hello World Settings'
  requirements:
    _permission: 'administer site configuration'

hello_world.payment_return:
  path: '/hello/payment-return'
  defaults:
    _controller: '\Drupal\hello_world\Controller\HelloController::paymentReturn'
    _title: 'PaySecure Return'
  requirements:
    _permission: 'access content'

hello_world.payment_return_ui:
  path: '/hello-world/payment-return-ui'
  defaults:
    _controller: '\Drupal\hello_world\Controller\HelloController::paymentReturnUI'         
    _title: 'Payment Return UI'
  requirements:
    _permission: 'access content' 

hello_world.payment_form:
  path: '/hello/payment-form'
  defaults:
    _controller: '\Drupal\hello_world\Controller\HelloController::paymentForm'
    _title: 'PaySecure Payment Form'
  requirements:
    _permission: 'access content'

