# routing.yml file essential for defining custom routes to tell the system which URL paths should be handled by your module.
# hello_world.content: unique route name.
# path: '/hello': the URL path / used for urls
# _controller: class or method that returns content drupal uses namespaces to organize and automatically load classes.
# _title: 'Hello World': the title of page and _permission: only shown to users with 'access content' permission.

hello_world.content:
path: '/hello'
defaults:
_controller: '\Drupal\hello_world\Controller\HelloController::hello'
_title: 'Hello World'
requirements:
_permission: 'access content'

hello_world.settings_form:
path: '/admin/config/development/hello-world'
defaults:
_form: '\Drupal\hello_world\Form\HelloWorldSettingsForm'
_title: 'Hello World Settings'
requirements:
_permission: 'administer site configuration'  # this permission is required to access the settings form